<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>stockPeek - Liếc phát biết giá</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">📈 <span>stockPeek</span><small>Liếc phát biết giá</small></div>
    <div class="addbox">
      <input id="tickerInput" type="text" placeholder="Thêm mã CK, vd: HPG, MWG..." />
      <button id="addBtn">+ Thêm</button>
    </div>
    <div id="authArea" class="auth-area"></div>
  </header>

  <div id="authModalBackdrop" class="auth-modal-backdrop" hidden>
    <div class="auth-modal">
      <button id="authModalClose" class="auth-modal-close">✕</button>
      <div class="auth-tabs">
        <button id="authTabLogin" class="auth-tab active">Đăng nhập</button>
        <button id="authTabRegister" class="auth-tab">Đăng ký</button>
      </div>

      <a id="googleLoginBtn" class="google-btn" href="/auth/google/login">
        <span>Đăng nhập với Google</span>
      </a>
      <div class="auth-divider"><span>hoặc</span></div>

      <form id="loginForm" class="auth-form">
        <input id="loginEmail" type="email" placeholder="Email" required />
        <input id="loginPassword" type="password" placeholder="Mật khẩu" required />
        <button type="submit">Đăng nhập</button>
      </form>

      <form id="registerForm" class="auth-form" hidden>
        <input id="registerName" type="text" placeholder="Tên hiển thị" />
        <input id="registerEmail" type="email" placeholder="Email" required />
        <input id="registerPassword" type="password" placeholder="Mật khẩu (ít nhất 6 ký tự)" required />
        <button type="submit">Tạo tài khoản</button>
      </form>

      <div id="authError" class="auth-error"></div>
    </div>
  </div>

  <div id="adminModalBackdrop" class="auth-modal-backdrop" hidden>
    <div class="auth-modal admin-modal">
      <button id="adminModalClose" class="auth-modal-close">✕</button>
      <h3 class="admin-modal-title">Quản trị</h3>

      <div class="auth-tabs admin-tabs">
        <button id="adminTabUsers" class="auth-tab active">Tài khoản</button>
        <button id="adminTabSources" class="auth-tab">Nguồn tin</button>
      </div>

      <div id="adminUsersPanel">
        <input id="adminSearchInput" class="admin-search" type="text" placeholder="Tìm theo tên hoặc email..." />
        <div id="adminError" class="auth-error"></div>
        <div class="admin-table-wrap">
          <table class="admin-table">
            <thead>
              <tr>
                <th>Người dùng</th>
                <th>Ngày tạo</th>
                <th>Quyền</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="adminUsersBody"></tbody>
          </table>
        </div>
      </div>

      <div id="adminSourcesPanel" hidden>
        <input id="adminSourceSearchInput" class="admin-search" type="text" placeholder="Tìm theo tên hoặc URL..." />
        <div id="adminSourceError" class="auth-error"></div>
        <div id="adminSourcesList" class="sources-list admin-sources-list"></div>
        <div class="addbox source-addbox">
          <input id="adminSourceNameInput" type="text" placeholder="Tên nguồn, vd: CafeF" />
          <input id="adminSourceUrlInput" type="text" placeholder="URL RSS, vd: https://vidu.vn/rss/chung-khoan.rss" />
          <button id="adminAddSourceBtn">+ Thêm nguồn</button>
        </div>
        <label class="source-lang-check">
          <input id="adminSourceForeignCheck" type="checkbox" />
          Nguồn tiếng nước ngoài (tự động dịch sang tiếng Việt khi hiển thị)
        </label>
      </div>
    </div>
  </div>

  <div id="adminConfirmBackdrop" class="auth-modal-backdrop" hidden>
    <div class="auth-modal admin-confirm-modal">
      <p id="adminConfirmText">Xoá tài khoản này?</p>
      <div class="admin-confirm-actions">
        <button id="adminConfirmCancel" class="auth-btn">Huỷ</button>
        <button id="adminConfirmOk" class="auth-btn danger">Xoá</button>
      </div>
    </div>
  </div>

  <main>
    <section class="hot-news-panel">
      <div class="section-head">
        <h2>🔥 Tin nóng</h2>
        <span class="updated" id="hotNewsUpdated">—</span>
      </div>
      <div id="hotNewsList" class="feed"></div>
    </section>

    <section class="live-news-panel">
      <div class="section-head">
        <h2>⚡ Tin trực tiếp</h2>
        <span class="updated" id="liveNewsUpdated">—</span>
      </div>
      <div class="live-news-table-wrap">
        <table class="live-news-table">
          <thead>
            <tr>
              <th>Giờ</th>
              <th>Nguồn</th>
              <th>Tiêu đề</th>
            </tr>
          </thead>
          <tbody id="liveNewsBody"></tbody>
        </table>
      </div>
    </section>

    <section class="indices-panel">
      <div class="section-head">
        <h2>Thị trường chứng khoán</h2>
        <span class="updated" id="indicesUpdated">—</span>
      </div>
      <div id="indicesGrid" class="indices-grid"></div>
    </section>

    <section class="watchlist">
      <div class="section-head">
        <h2>Danh mục theo dõi</h2>
        <span class="updated" id="quotesUpdated">—</span>
      </div>
      <div id="watchlistGrid" class="watchlist-grid"></div>
    </section>

    <section class="overview-panel">
      <div class="section-head">
        <h2>Nhận định thị trường chung</h2>
        <span class="updated" id="overviewUpdated">—</span>
      </div>
      <div id="overviewContent"></div>
    </section>

    <section class="sector-panel">
      <div class="section-head">
        <h2>Phân tích theo nhóm ngành</h2>
        <span class="updated" id="sectorUpdated">—</span>
      </div>
      <p class="sector-disclaimer" id="sectorDisclaimer"></p>
      <div id="sectorGrid" class="sector-grid"></div>
    </section>

    <section class="sources-panel">
      <div class="section-head">
        <h2>Nguồn tin tức</h2>
      </div>
      <div id="sourcesList" class="sources-list"></div>
      <div class="addbox source-addbox">
        <input id="sourceNameInput" type="text" placeholder="Tên nguồn, vd: CafeF" />
        <input id="sourceUrlInput" type="text" placeholder="URL RSS, vd: https://vidu.vn/rss/chung-khoan.rss" />
        <button id="addSourceBtn">+ Thêm nguồn</button>
      </div>
      <label class="source-lang-check">
        <input id="sourceForeignCheck" type="checkbox" />
        Nguồn tiếng nước ngoài (tự động dịch sang tiếng Việt khi hiển thị)
      </label>
      <div id="sourceError" class="source-error"></div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
